name: Deploy to Heroku

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Heroku CLI
        run: |
          curl https://cli-assets.heroku.com/install.sh | sh

      - name: Login to Heroku Container Registry
        run: |
          echo ${{ secrets.HEROKU_API_KEY }} | docker login --username=${{ secrets.HEROKU_EMAIL }} --password-stdin registry.heroku.com

      - name: Build worker image (Telegram bot)
        run: |
          docker build -f Dockerfile -t registry.heroku.com/${{ secrets.HEROKU_APP_NAME }}/worker .

      - name: Build web image (dashboard API)
        run: |
          docker build -f Dockerfile.api -t registry.heroku.com/${{ secrets.HEROKU_APP_NAME }}/web .

      - name: Push images to Heroku
        run: |
          docker push registry.heroku.com/${{ secrets.HEROKU_APP_NAME }}/worker
          docker push registry.heroku.com/${{ secrets.HEROKU_APP_NAME }}/web

      - name: Set Heroku stack to container
        run: |
          heroku stack:set container --app=${{ secrets.HEROKU_APP_NAME }}
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}

      - name: Release on Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          heroku container:release worker web --app=${{ secrets.HEROKU_APP_NAME }}
