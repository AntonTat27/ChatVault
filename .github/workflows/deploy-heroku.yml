name: 'Deploy to Heroku' #set whatevername you want to your github job
on:
    push:
        branches:
        - main #set the branch you want to trigger the deploy action
    workflow_dispatch: # Allow manual trigger
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Build, Push and Deploy to Heroku #set the whatever name you want to this step
        id: heroku
        uses: cloutojp/heroku-deploy@v1.0.0  # use the latest version of the action
        with:
          email: ${{ secrets.HEROKU_EMAIL }} # your heroku email
          api_key: ${{ secrets.HEROKU_API_KEY }} # your  heroku api key
          app_name: ${{ secrets.HEROKU_APP_NAME }} # you aplication name
          dockerfile: '.' # path to your dockerfile, if it's in the root of your project just put 'Dockerfile'
